name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release build
        run: |
          pnpm lint
          pnpm audit:high
          pnpm typecheck
          pnpm test:coverage

      - name: Build release assets
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: |
          pnpm release:package
          pnpm release:executable -- \
            --target=linux-x64 \
            --target=linux-arm64 \
            --target=darwin-x64 \
            --target=darwin-arm64 \
            --target=windows-x64 \
            --target=windows-arm64

      - name: Verify built CLI assets
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: |
          pnpm verify:release-assets

      - name: Stage release upload assets
        run: |
          mkdir -p dist/upload
          cp dist/release/*.tar.gz dist/upload/
          cp dist/executables/kakashi-v* dist/upload/
          cd dist/upload
          shasum -a 256 * > SHA256SUMS.txt

      - name: Create release notes
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: |
          cat > release-notes.md <<EOF
          # Kakashi ${RELEASE_VERSION}

          本版本包含以下平台的 Kakashi CLI 单文件可执行文件：

          English: This release includes single-file Kakashi CLI executables for:

          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - windows-x64
          - windows-arm64

          单文件可执行文件内嵌 Kakashi Web UI，以及启动 Kakashi 所需的 Node.js runtime。真实运行 Kakashi 仍需要 Git、GitHub CLI 认证和 Codex CLI。

          English: The single-file executables embed the Kakashi Web UI and the Node.js runtime needed to start Kakashi. Git, GitHub CLI authentication, and Codex CLI are still required for real Kakashi runs.

          本版本也包含归档包，适合需要 README.md、README-en.md、INSTALL.md、LICENSE、CONTRIBUTING.md、SECURITY.md、wrapper scripts 和 Web UI 文件目录的用户。归档包运行时需要 Node.js 24+。

          English: Archive packages are also included for users who prefer an unpacked directory with README.md, README-en.md, INSTALL.md, LICENSE, CONTRIBUTING.md, SECURITY.md, wrapper scripts, and Web UI files. Archives require Node.js 24+ at runtime.

          CLI 和 Web UI 用法请查看仓库 README.md / README-en.md，以及每个归档包内的 INSTALL.md。

          English: See README.md / README-en.md in this repository, and INSTALL.md inside each archive, for CLI and Web UI usage.
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/upload/* --clobber
          else
            gh release create "$RELEASE_VERSION" dist/upload/* \
              --title "Kakashi $RELEASE_VERSION" \
              --notes-file release-notes.md
          fi
