name: Bug report
description: Report a reproducible Kakashi bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste API keys, GitHub tokens, Codex access tokens, private repository contents, or sensitive logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands and relevant environment details.
      placeholder: |
        1. Run `kakashi doctor`
        2. Run `kakashi run "..."`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kakashi version
      placeholder: v0.2.0
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node.js 24, pnpm 10, Codex CLI version
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Paste only redacted logs. Remove credentials and private repository details.
      render: shell
